name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15  # Apple Silicon
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (Swift 6.2+ for Traversio)
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Build and test
        run: make check

      - name: Live SFTP integration smoke test
        run: make integration-test

  benchmark:
    runs-on: macos-15  # Apple Silicon
    permissions:
      contents: read
      actions: write  # upload-artifact
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (Swift 6.2+ for Traversio)
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Run Apple Silicon benchmark suite
        run: make bench-apple-silicon

      - name: Verify pass criteria
        run: ./scripts/verify-benchmark-report.sh

      - name: Cloud backend benchmarks
        continue-on-error: true
        run: |
          ./scripts/benchmark-cloud-env.sh start
          eval "$(./scripts/benchmark-cloud-env.sh env)"
          swift run macscp-benchmark cloud-backends

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-macos-15
          path: |
            .benchmark/benchmark-results/report.json
            .benchmark/benchmark-results/upload-spike.json
            .benchmark/benchmark-results/cloud-backends.json
          if-no-files-found: ignore
